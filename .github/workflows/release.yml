# GitHub Releasing Workflow
name: GitHub - Release

on:
  workflow_call:
    inputs:
      version:
        description: "Explicit version to release (e.g., 2.3.0). Takes priority over bump."
        required: false
        type: string
        default: ''
      bump:
        description: "Auto-bump from latest release tag (patch/minor/major). Ignored if version is set."
        required: false
        type: string
        default: ''
      prerelease:
        description: "Create as a pre-release (skips major/minor tag updates)"
        required: false
        type: boolean
        default: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          if [ -n "$INPUT_VERSION" ] && [ -n "$INPUT_BUMP" ]; then
            echo "::warning::Both 'version' and 'bump' were provided. Using explicit 'version' ($INPUT_VERSION)."
          fi

          if [ -n "$INPUT_VERSION" ]; then
            echo "Using explicit version: $INPUT_VERSION"
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$INPUT_BUMP" ]; then
            echo "::error::Either 'version' or 'bump' input is required."
            exit 1
          fi

          # Look up latest release tag and increment
          LATEST=$(gh api /repos/$GITHUB_REPOSITORY/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            echo "::warning::No existing releases found. Defaulting to 0.1.0"
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Strip leading 'v' if present
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          case "$INPUT_BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "::error::Invalid bump type '$INPUT_BUMP'. Must be patch, minor, or major."; exit 1 ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bumped $LATEST -> $NEW_VERSION ($INPUT_BUMP)"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  release:
    needs: resolve-version
    runs-on: ubuntu-latest
    if: ${{ needs.resolve-version.outputs.version != '' }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # https://github.com/peter-murray/semver-data-action
      - name: Parse SemVer
        id: version
        uses: peter-murray/semver-action@5a07021b987a48fb9129231397615329ad74703c # v1.0.1
        with:
          version: ${{ needs.resolve-version.outputs.version }}

      # Tags :: ${Full}, v${Major}, v${Major}.${Minor}, v${Major}.${Minor}.${Patch}
      - name: "GitHub Release"
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
          VERSION_TAG: v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}.${{ steps.version.outputs.patch }}
          MAJOR_TAG: v${{ steps.version.outputs.major }}
          MINOR_TAG: v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git tag "$VERSION_TAG" --force

          # Only update major/minor floating tags for full releases
          if [ "$PRERELEASE" != "true" ]; then
            git tag "$MAJOR_TAG" --force
            git tag "$MINOR_TAG" --force
          fi

          git push origin ${{ github.ref_name }}
          git push origin --tags --force

          # Create or update the release (supports promotion from prerelease)
          if gh release view "$VERSION_TAG" > /dev/null 2>&1; then
            echo "Release $VERSION_TAG exists — updating"
            if [ "$PRERELEASE" = "true" ]; then
              gh release edit "$VERSION_TAG" --prerelease --title "$VERSION_TAG"
            else
              gh release edit "$VERSION_TAG" --latest --prerelease=false --title "$VERSION_TAG"
            fi
          else
            echo "Creating release $VERSION_TAG"
            RELEASE_FLAGS="--generate-notes --title $VERSION_TAG"
            if [ "$PRERELEASE" = "true" ]; then
              RELEASE_FLAGS="$RELEASE_FLAGS --prerelease"
            else
              RELEASE_FLAGS="$RELEASE_FLAGS --latest"
            fi
            gh release create $RELEASE_FLAGS "$VERSION_TAG"
          fi
      
