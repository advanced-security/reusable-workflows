# One-off utility workflow to reset a tag to a specific commit.
# Delete this workflow after use.
name: "Utility - Reset Tag"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to reset (e.g., v0.2.0)"
        required: true
        type: string
      commit:
        description: "Target commit SHA"
        required: true
        type: string

permissions:
  contents: write

jobs:
  reset-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Reset tag
        env:
          TAG_NAME: ${{ inputs.tag }}
          TARGET_SHA: ${{ inputs.commit }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          echo "Resetting tag $TAG_NAME to commit $TARGET_SHA"
          git log --oneline -1 "$TARGET_SHA"
          git tag -fa "$TAG_NAME" "$TARGET_SHA" -m "$TAG_NAME"
          git push origin "$TAG_NAME" --force
          echo "✅ Tag $TAG_NAME now points to $TARGET_SHA"
