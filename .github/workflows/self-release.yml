name: "Self - Release"

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: "The type of version bump to perform"
        options:
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      cooldown-days:
        description: 'Number of days to use as the dependency cooldown window (excludes packages newer than N days)'
        type: number
        default: 3

permissions:
  contents: write
  pull-requests: write

jobs:
  # Manual version bump: creates a PR with the bumped version in .release.yml
  release-next:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # NOTE: patch-release-me bumps version refs inside .github/workflows/*.yml
    # (configured in .release.yml). create-pull-request needs a PAT or GitHub
    # App token with `workflows` scope to push those changes. GITHUB_TOKEN
    # cannot modify workflow files. Pass a custom token via secrets if needed.
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2

      - name: "Patch Release Me"
        uses: 42ByteLabs/patch-release-me@04ea0a696abfc3cfbdfadb279bd9c9dd0b1652a2 # 0.6.5
        with:
          mode: ${{ github.event.inputs.bump }}

      - name: "Create Release PR"
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          commit-message: "[chore]: Create release for ${{ github.event.inputs.bump }}"
          title: "[chore]: Create release (${{ github.event.inputs.bump }} bump)"
          branch: chore-release-${{ github.event.inputs.bump }}
          labels: version
          body: |
            This is an automated PR to create a new release. The release will be created once this PR is merged.

  # Automatic release: triggered when .release.yml version changes on push to main
  fetch-release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.version-changes.outputs.release }}
      version: ${{ steps.version-changes.outputs.version }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2

      - name: "Fetch Release"
        id: version-changes
        env:
          GH_TOKEN: ${{ github.token }}
          COOLDOWN_DAYS: ${{ inputs.cooldown-days || 3 }}
        run: |
          set -e

          python -m pip install --upgrade uv
          if [[ -f requirements.txt ]]; then
            uv pip sync requirements.txt --exclude-newer "$(date -u -d "$COOLDOWN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)"
          else
            uv pip install yq --exclude-newer "$(date -u -d "$COOLDOWN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)"
          fi

          current_version=$(cat .release.yml | yq -r ".version")
          released_version=$(gh api -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" /repos/:owner/:repo/releases/latest | jq -r ".tag_name")

          # Strip leading 'v' prefix for comparison (tags use v0.2.0, .release.yml uses 0.2.0)
          released_version="${released_version#v}"

          echo "📋 Version source: .release.yml"
          echo "   Current version: $current_version"
          echo "   Latest release:  $released_version"

          if [[ "$current_version" == "NA" || "$current_version" == "$released_version" ]]; then
            echo "✅ No new release needed — versions match"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "🚀 New release detected: $current_version (latest release is $released_version)"
            echo "::notice::Release v$current_version will be created. Version is controlled by .release.yml in this repository. To change the target version, update the 'version' field in .release.yml."
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    # Always pin to main as we aren't sure if the version exisits at this point
    uses: advanced-security/reusable-workflows/.github/workflows/release.yml@main
    needs: [ fetch-release ]
    if: ${{ needs.fetch-release.outputs.release == 'true' }}
    secrets: inherit
    with:
      version: ${{ needs.fetch-release.outputs.version }}
