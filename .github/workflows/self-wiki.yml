name: "Self - Publish Wiki"

on:
  push:
    branches: ["main"]
    paths:
      - wiki/**
      - .github/workflows/wiki.yml


permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      
      - uses: Andrew-Chen-Wang/github-wiki-action@1bbb4280446f9630e8e21a18012cbacf3b0f992e
