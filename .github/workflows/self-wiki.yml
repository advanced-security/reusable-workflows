name: "Self - Publish Wiki"

on:
  push:
    branches: ["main"]
    paths:
      - wiki/**
      - .github/workflows/wiki.yml


permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      
      - uses: Andrew-Chen-Wang/github-wiki-action@64efa0a9436db17670a2259e0ac249d6f08bb352
